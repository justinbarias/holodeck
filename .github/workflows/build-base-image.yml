name: Build Base Image

on:
  push:
    branches: [main]
    paths:
      - 'docker/**'
      - '.github/workflows/build-base-image.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag for the image (e.g., 0.1.0)'
        required: false
        type: string
      holodeck_version:
        description: 'HoloDeck package version to install (default: latest)'
        required: false
        type: string
  workflow_run:
    workflows: ["Release"]
    types: [completed]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: justinbarias/holodeck-base

jobs:
  build:
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve release version
        id: release_version
        run: |
          if [ "${{ github.event_name }}" == "workflow_run" ]; then
            TAG="${{ github.event.workflow_run.head_branch }}"
            VERSION="${TAG#v}"
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
            echo "is_release=true" >> $GITHUB_OUTPUT
          else
            echo "version=" >> $GITHUB_OUTPUT
            echo "is_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Set latest tag for main branch or release
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') || steps.release_version.outputs.is_release == 'true' }}
            # Set SHA tag for all builds
            type=sha,prefix=,format=short
            # Set version tag from workflow input
            type=raw,value=${{ inputs.version }},enable=${{ inputs.version != '' }}
            # Set version tag from release workflow
            type=raw,value=${{ steps.release_version.outputs.version }},enable=${{ steps.release_version.outputs.is_release == 'true' }}

      - name: Determine HoloDeck version
        id: holodeck_version
        run: |
          if [ -n "${{ inputs.holodeck_version }}" ] && [ "${{ inputs.holodeck_version }}" != "latest" ]; then
            echo "version=${{ inputs.holodeck_version }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" == "workflow_run" ]; then
            # Triggered by Release workflow — use its head branch tag (strip 'v' prefix)
            VERSION="${{ github.event.workflow_run.head_branch }}"
            echo "version=${VERSION#v}" >> $GITHUB_OUTPUT
          else
            # Empty string means latest from PyPI
            echo "version=" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./docker
          file: ./docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            HOLODECK_VERSION=${{ steps.holodeck_version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: |
          echo "Image pushed with digest: ${{ steps.build.outputs.digest }}"
          echo ""
          echo "Tags:"
          echo "${{ steps.meta.outputs.tags }}" | tr ',' '\n'
