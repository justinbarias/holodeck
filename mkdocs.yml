site_name: HoloDeck Documentation
site_description: AI Agent Experimentation Platform - Define agents in YAML, no code required
site_url: https://docs.useholodeck.ai/
repo_url: https://github.com/justinbarias/holodeck
repo_name: justinbarias/holodeck
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/holodeck.png
  favicon: assets/holodeck.png
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quickstart: getting-started/quickstart.md
  - Guides:
    - Agent Configuration: guides/agent-configuration.md
    - LLM Providers: guides/llm-providers.md
    - Claude Backend: guides/claude-backend.md
    - Semantic Kernel Backend: guides/semantic-kernel-backend.md
    - Tools: guides/tools.md
    - MCP CLI: guides/mcp-cli.md
    - Vector Stores: guides/vector-stores.md
    - Evaluations: guides/evaluations.md
    - Optimizer: guides/optimizer.md
    - Dashboard: guides/dashboard.md
    - Global Configuration: guides/global-config.md
    - File References: guides/file-references.md
    - Agent Server: guides/serve.md
    - Deployment: guides/deployment.md
    - Observability: guides/observability.md
  - Examples:
    - Overview: examples/README.md
  - API Reference:
    - Models: api/models.md
    - Configuration: api/config-loader.md
    - CLI: api/cli.md
    - Chat: api/chat.md
    - Serve: api/serve.md
    - Deploy: api/deploy.md
    - Services: api/services.md
    - Backends: api/backends.md
    - Tools: api/tools.md
    - Test Runner: api/test-runner.md
    - Evaluators: api/evaluators.md
    - Observability: api/observability.md
    - PDF Processor: api/pdf-processor.md
    - Utilities: api/utilities.md
  - Developer:
    - Contributing: contributing.md
    - Changelog: CHANGELOG.md

hooks:
  - scripts/mkdocs_hooks.py

plugins:
  - search:
      lang: en
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            docstring_style: google
            merge_init_into_class: true
            show_source: true
            inherited_members: true
            filters:
              - "!^_"  # private
            show_root_heading: true
            show_root_full_path: false
  - llmstxt:
      markdown_description: |
        HoloDeck is an open-source, no-code platform for building, testing,
        and deploying AI agents via YAML. This index points LLMs at the
        canonical docs for the CLI, agent schema, backends (Claude / SK),
        tools (vectorstore, MCP, hierarchical_document), evaluations,
        and the agent server.
      full_output: llms-full.txt
      sections:
        Getting Started:
          - getting-started/installation.md
          - getting-started/quickstart.md
        Guides:
          - guides/agent-configuration.md
          - guides/llm-providers.md
          - guides/claude-backend.md
          - guides/semantic-kernel-backend.md
          - guides/tools.md
          - guides/mcp-cli.md
          - guides/vector-stores.md
          - guides/evaluations.md
          - guides/optimizer.md
          - guides/dashboard.md
          - guides/global-config.md
          - guides/file-references.md
          - guides/serve.md
          - guides/deployment.md
          - guides/observability.md
        API Reference:
          - api/*.md
        Developer:
          - contributing.md
          - CHANGELOG.md

markdown_extensions:
  - pymdownx.highlight:
      use_pygments: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - toc:
      permalink: true
  - tables
  - pymdownx.tasklist
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  version: 0.3.0
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/justinbarias/holodeck
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/anthropic
